# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.2.6"
  python_check_max: '3.14'

package:
  name: legend-lh5io
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/l/legend-lh5io/legend_lh5io-${{ version }}.tar.gz
  sha256: dc50625f680f961644e5405234249c70168fc076afaf619e50ea692f094c954b

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools >=77
    - setuptools-scm >=7
  run:
    - awkward >=2
    - colorlog
    - h5py >=3.16
    - hdf5plugin
    - legend-pydataobj >=2.0.1
    - numba !=0.53,!=0.54.*
    - numpy >=1.21
    - pandas >=1.4.4
    - parse
    - python >=${{ python_min }}
    - rich
tests:
  - python:
      imports: lh5
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - lh5ls --help
      - lh5concat --help

about:
  license: GPL-3.0-only
  license_file: LICENSE
  summary: LEGEND Python Data Objects
  description: |
    This package provides a Python implementation of the LEGEND Data Objects
    (LGDO) I/O to HDF5, including Numba-accelerated custom compression
    algorithms for particle detector signals.
    More documentation is available in the
    [LEGEND data format specification](https://legend-exp.github.io/legend-data-format-specs).
  homepage: https://pypi.org/project/legend-lh5io
  repository: https://github.com/legend-exp/legend-lh5io
  documentation: https://legend-lh5io.readthedocs.io/

extra:
  recipe-maintainers:
    - gipert
